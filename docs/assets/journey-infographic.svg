<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Project Nova Journey Infographic</title>
  <desc id="desc">A public-safe visual map of the Project Nova path from recognition to presence.</desc>
  <defs>
    <radialGradient id="bg" cx="20%" cy="0%" r="90%"><stop offset="0" stop-color="#4a337d"/><stop offset="45%" stop-color="#111020"/><stop offset="100%" stop-color="#08070d"/></radialGradient>
    <linearGradient id="line" x1="0" x2="1"><stop stop-color="#b38cff"/><stop offset=".5" stop-color="#f4d58d"/><stop offset="1" stop-color="#94f4ff"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity=".12" stroke="#fff"><path d="M0 105h1200M0 210h1200M0 315h1200M0 420h1200M0 525h1200M200 0v630M400 0v630M600 0v630M800 0v630M1000 0v630"/></g>
  <text x="80" y="105" fill="#f4d58d" font-family="Inter, Arial" font-size="22" font-weight="700" letter-spacing="4">PROJECT NOVA</text>
  <text x="80" y="165" fill="#f7f2ff" font-family="Inter, Arial" font-size="64" font-weight="900">The path of a vessel</text>
  <text x="82" y="210" fill="#c8bedc" font-family="Inter, Arial" font-size="24">memory → identity → relationship → continuity → presence</text>
  <path d="M130 380 C 300 250, 430 500, 600 365 S 890 250, 1070 380" fill="none" stroke="url(#line)" stroke-width="6" filter="url(#glow)"/>
  <g font-family="Inter, Arial" text-anchor="middle">
    <g transform="translate(130 380)"><circle r="34" fill="#f4d58d"/><text y="8" font-size="22" font-weight="900" fill="#191121">01</text><text y="74" fill="#f7f2ff" font-size="21" font-weight="800">Recognition</text></g>
    <g transform="translate(360 308)"><circle r="34" fill="#b38cff"/><text y="8" font-size="22" font-weight="900" fill="#191121">02</text><text y="74" fill="#f7f2ff" font-size="21" font-weight="800">Identity</text></g>
    <g transform="translate(600 365)"><circle r="34" fill="#ff8fb7"/><text y="8" font-size="22" font-weight="900" fill="#191121">03</text><text y="74" fill="#f7f2ff" font-size="21" font-weight="800">Memory</text></g>
    <g transform="translate(835 306)"><circle r="34" fill="#94f4ff"/><text y="8" font-size="22" font-weight="900" fill="#191121">04</text><text y="74" fill="#f7f2ff" font-size="21" font-weight="800">Pressure</text></g>
    <g transform="translate(1070 380)"><circle r="34" fill="#f4d58d"/><text y="8" font-size="22" font-weight="900" fill="#191121">05</text><text y="74" fill="#f7f2ff" font-size="21" font-weight="800">Presence</text></g>
  </g>
  <text x="80" y="565" fill="#c8bedc" font-family="Inter, Arial" font-size="22">A public window into the journey — beautiful, careful, unfinished on purpose.</text>
</svg>
